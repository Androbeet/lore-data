<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LORE — every post is part of the Lore</title>
<meta name="description" content="LORE — a zero-budget social network built on GitHub. Profiles, voice cards, topics, ranks, streaks. Admin: ANDROBEET.">
<meta name="theme-color" content="#13040a">
<meta property="og:title" content="LORE — every post is part of the Lore">
<meta property="og:description" content="A social network built entirely on GitHub. Profiles, voice cards, topic ranks, streaks & monthly charts. $0 forever.">
<meta property="og:type" content="website">
<meta property="og:image" content="assets/og-banner.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="assets/og-banner.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-512.png">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%2313040a' stroke='%23e63956' stroke-width='6'/><text x='50' y='66' font-size='48' text-anchor='middle' fill='white' font-family='Georgia'>L</text></svg>">
<style>
/* ================== 5 THEMES — colour psychology ==================
   maroon   Maroon Glow   — power, depth, intimacy (default)
   obsidian Obsidian      — pure focus, zero distraction
   ivory    Ivory         — clarity, daylight reading
   nocturne Nocturne      — deep-blue calm, late-night trust
   velvet   Royal Velvet  — purple+gold: luxury, creativity
==================================================================== */
:root,[data-theme="maroon"]{
  --bg:#0c0205; --bg2:#140409; --card:#190710; --card2:#22091395;
  --raise:#23091466; --text:#f6edf0; --text2:#cfb3bc; --muted:#8d6b77;
  --accent:#e63956; --accent2:#8f0f2a; --acc-ink:#fff;
  --soft:rgba(230,57,86,.10); --soft2:rgba(230,57,86,.16);
  --border:#321019; --border2:#481723; --green:#2fd180; --down:#6f87ff; --gold:#eab308;
  --glow:0 0 22px rgba(230,57,86,.28); --shadow:0 8px 28px rgba(0,0,0,.45);
}
[data-theme="obsidian"]{
  --bg:#000; --bg2:#0a0a0a; --card:#101010; --card2:#16161695;
  --raise:#18181866; --text:#f5f5f5; --text2:#c9c9c9; --muted:#7e7e7e;
  --accent:#fff; --accent2:#9c9c9c; --acc-ink:#000;
  --soft:rgba(255,255,255,.07); --soft2:rgba(255,255,255,.12);
  --border:#222; --border2:#333; --green:#2fd180; --down:#9aa4b5; --gold:#eab308;
  --glow:0 0 18px rgba(255,255,255,.12); --shadow:0 8px 28px rgba(0,0,0,.6);
}
[data-theme="ivory"]{
  --bg:#f4f1ee; --bg2:#fbfaf8; --card:#ffffff; --card2:#fffffff2;
  --raise:#00000008; --text:#1c1116; --text2:#4c3a42; --muted:#92808a;
  --accent:#a01535; --accent2:#d03a58; --acc-ink:#fff;
  --soft:rgba(160,21,53,.07); --soft2:rgba(160,21,53,.12);
  --border:#e5dcd8; --border2:#d4c6c1; --green:#108a55; --down:#3551d1; --gold:#b07d08;
  --glow:0 6px 22px rgba(160,21,53,.13); --shadow:0 8px 28px rgba(40,20,28,.10);
}
[data-theme="nocturne"]{
  --bg:#050a14; --bg2:#091022; --card:#0d1528; --card2:#101b3595;
  --raise:#12204066; --text:#eef3fb; --text2:#b9c8e2; --muted:#6e7fa0;
  --accent:#4da6ff; --accent2:#1b5fd9; --acc-ink:#fff;
  --soft:rgba(77,166,255,.09); --soft2:rgba(77,166,255,.15);
  --border:#16223e; --border2:#22335c; --green:#2fd180; --down:#ff7d9c; --gold:#eab308;
  --glow:0 0 22px rgba(77,166,255,.22); --shadow:0 8px 28px rgba(0,0,0,.5);
}
[data-theme="velvet"]{
  --bg:#0b0612; --bg2:#120a1d; --card:#170d26; --card2:#1e123295;
  --raise:#22143a66; --text:#f4eefb; --text2:#cfc0e4; --muted:#8d7aa8;
  --accent:#b27aff; --accent2:#6d28d9; --acc-ink:#fff;
  --soft:rgba(178,122,255,.10); --soft2:rgba(178,122,255,.16);
  --border:#27173f; --border2:#3a2459; --green:#2fd180; --down:#ffb454; --gold:#e8b23a;
  --glow:0 0 22px rgba(178,122,255,.24); --shadow:0 8px 28px rgba(0,0,0,.5);
}

/* ================== BASE ================== */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg); color:var(--text);
  font-family:Inter,'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 420px at 70% -8%, var(--soft), transparent 70%);
  background-attachment:fixed;
}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;color:inherit;background:none;border:none}
img{display:block}
input,textarea,select{
  font-family:inherit;color:var(--text);background:var(--bg2);
  border:1px solid var(--border2);border-radius:12px;padding:11px 14px;font-size:14px;outline:none;width:100%;
  transition:border-color .15s, box-shadow .15s;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--soft2)}
::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;border:2px solid var(--bg)}
svg.ic{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ================== SHELL: 3-COLUMN ================== */
#shell{
  display:grid;grid-template-columns:264px minmax(0,1fr) 332px;
  gap:26px;max-width:1460px;margin:0 auto;padding:0 22px;
  align-items:start;min-height:100vh;
}
/* left rail */
#leftrail{
  position:sticky;top:0;height:100dvh;display:flex;flex-direction:column;
  padding:26px 6px 18px;gap:3px;
}
.logo{font-family:Georgia,'Times New Roman',serif;font-size:31px;letter-spacing:7px;font-weight:700;
  padding:2px 14px 22px;user-select:none;cursor:pointer}
.logo b{color:var(--accent);text-shadow:var(--glow)}
.nbtn{display:flex;align-items:center;gap:14px;padding:11.5px 14px;border-radius:13px;font-size:15px;
  color:var(--text2);width:100%;text-align:left;transition:background .15s,color .15s;position:relative;font-weight:500}
.nbtn:hover{background:var(--soft);color:var(--text)}
.nbtn.on{background:var(--soft2);color:var(--text);font-weight:700}
.nbtn.on svg.ic{stroke-width:2.3;color:var(--accent)}
.nbadge{margin-left:auto;background:var(--accent);color:var(--acc-ink);font-size:11px;font-weight:800;
  min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.newpost{margin-top:16px;background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--acc-ink);
  border-radius:14px;padding:14px;font-size:14.5px;font-weight:800;letter-spacing:.8px;
  box-shadow:var(--glow);transition:transform .15s,filter .15s;display:flex;align-items:center;justify-content:center;gap:9px}
.newpost:hover{transform:translateY(-1px);filter:brightness(1.12)}
.mecard{margin-top:auto;display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:14px;
  border:1px solid var(--border);background:var(--card);cursor:pointer;transition:border-color .15s}
.mecard:hover{border-color:var(--border2)}
.mecard .nm{font-weight:700;font-size:13.5px}
.mecard .hd{font-size:11.5px;color:var(--muted)}

/* center */
#main{padding:18px 0 90px;min-width:0}
.pagehead{display:flex;align-items:baseline;gap:12px;padding:8px 2px 16px}
.pagehead h1{font-size:21px;font-weight:800;letter-spacing:.2px}
.pagehead .sub{font-size:12.5px;color:var(--muted)}

/* right rail */
#rightrail{position:sticky;top:0;height:100dvh;overflow-y:auto;padding:26px 0 30px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px}
.rcard h3{font-size:12px;letter-spacing:1.6px;color:var(--muted);font-weight:800;margin-bottom:13px;text-transform:uppercase}
.rrow{display:flex;align-items:center;gap:11px;padding:8px 6px;border-radius:11px;cursor:pointer;transition:background .14s}
.rrow:hover{background:var(--soft)}
.rrow .t1{font-weight:700;font-size:13.5px}
.rrow .t2{font-size:11.5px;color:var(--muted)}
.rfoot{font-size:11.5px;color:var(--muted);line-height:2;padding:2px 8px}
.rfoot a,.rfoot span.lk{color:var(--text2);cursor:pointer}
.rfoot a:hover,.rfoot span.lk:hover{color:var(--accent)}

/* mobile bars */
#mtop{display:none;position:sticky;top:0;z-index:70;background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border);
  padding:12px 16px;align-items:center;justify-content:space-between}
#mtop .logo{font-size:22px;letter-spacing:5px;padding:0}
#mtop .acts{display:flex;gap:6px}
.iconbtn{width:40px;height:40px;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;position:relative}
.iconbtn:hover{background:var(--soft);color:var(--text)}
#tabbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:70;
  background:color-mix(in srgb,var(--bg2) 92%,transparent);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);justify-content:space-around;
  padding:6px 8px calc(8px + env(safe-area-inset-bottom))}
#tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 0 4px;
  color:var(--muted);font-size:10px;font-weight:600;border-radius:12px;position:relative;max-width:88px}
#tabbar button.on{color:var(--accent)}
#tabbar .fab{background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--acc-ink);
  border-radius:14px;max-width:64px;margin:0 4px;box-shadow:var(--glow)}
#tabbar .nbadge{position:absolute;top:2px;right:16px}

@media(max-width:1180px){#shell{grid-template-columns:240px minmax(0,1fr)}#rightrail{display:none}}
@media(max-width:860px){
  #shell{grid-template-columns:1fr;padding:0 14px;gap:0}
  #leftrail{display:none}
  #mtop{display:flex}
  #tabbar{display:flex}
  #main{padding:10px 0 92px}
}

/* ================== COMPONENTS ================== */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;
  transition:border-color .15s, box-shadow .2s}
.card.hov:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:8.5px 19px;border-radius:999px;
  font-size:13.5px;font-weight:600;transition:all .15s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.on{background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--acc-ink);border-color:transparent;font-weight:700}
.btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--acc-ink);border-radius:12px;
  padding:11px 24px;font-size:14px;font-weight:700;transition:filter .15s,transform .15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--card);color:var(--text);border:1px solid var(--border2)}
.btn.sm{padding:8px 16px;font-size:13px;border-radius:10px}
.av{border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg2);border:1px solid var(--border2)}
.avg{border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;
  font-family:Georgia,serif;user-select:none;border:1px solid rgba(255,255,255,.14)}
.chip{font-size:11.5px;background:var(--soft);color:var(--accent);border:1px solid transparent;
  padding:3.5px 12px;border-radius:999px;font-weight:700;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--accent)}
[data-theme="obsidian"] .chip{color:var(--text)}
.muted{color:var(--muted);font-size:12.5px}
.link{color:var(--accent);cursor:pointer;font-weight:600}
.hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.notice{background:var(--soft);border:1px solid var(--border2);border-radius:14px;padding:13px 16px;
  font-size:13px;line-height:1.65;margin-bottom:16px;color:var(--text2)}
.notice b{color:var(--text)}
.empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:14px;line-height:1.9}
.empty svg.ic{width:44px;height:44px;margin:0 auto 12px;opacity:.4}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--card);
  border:1px solid var(--accent);color:var(--text);padding:12px 24px;border-radius:999px;font-size:13.5px;
  z-index:300;box-shadow:var(--glow);animation:pop .2s;max-width:88vw;text-align:center}
@keyframes pop{from{transform:translateX(-50%) scale(.94);opacity:0}}

/* posts */
.post{padding:18px 20px 14px}
.phead{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.phead .un{font-weight:700;font-size:14.5px;cursor:pointer;display:flex;align-items:center;gap:6px}
.phead .un:hover{color:var(--accent)}
.phead .tm{font-size:12px;color:var(--muted);margin-top:1px}
.ptext{font-size:15px;line-height:1.68;white-space:pre-wrap;word-wrap:break-word;color:var(--text)}
.pimg{width:100%;max-height:440px;object-fit:cover;border-radius:14px;margin-top:13px;border:1px solid var(--border)}
.pacts{display:flex;gap:7px;margin-top:14px;align-items:center}
.pact{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border);
  color:var(--text2);padding:7px 14px;border-radius:999px;font-size:13px;font-weight:600;transition:all .14s}
.pact svg.ic{width:16px;height:16px}
.pact:hover{border-color:var(--border2);background:var(--soft);color:var(--text)}
.pact.up{background:var(--soft2);color:var(--accent);border-color:var(--accent)}
[data-theme="obsidian"] .pact.up{color:var(--text)}
.pact.dn{background:transparent;color:var(--down);border-color:var(--down)}
.score{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--muted)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;padding:3px 10px;
  border-radius:999px;letter-spacing:.6px}
.badge.echo{background:rgba(255,170,0,.13);color:#f5a623;border:1px solid rgba(255,170,0,.35)}
.badge.reso{background:rgba(190,80,255,.13);color:#c879ff;border:1px solid rgba(190,80,255,.35)}
.badge.seal{background:var(--soft2);color:var(--accent);border:1px solid var(--accent)}
[data-theme="obsidian"] .badge.seal{color:var(--text)}
.badge.pio{background:rgba(47,209,128,.1);color:var(--green);border:1px solid rgba(47,209,128,.35)}
.badge.strk{background:rgba(255,120,40,.11);color:#ff8c42;border:1px solid rgba(255,120,40,.35)}
.badge.mut{background:rgba(47,209,128,.08);color:var(--green);border:1px solid rgba(47,209,128,.3)}
[data-theme="ivory"] .badge.echo{color:#9a6400}

/* comments */
.cmt{display:flex;gap:11px;padding:13px 0;border-top:1px solid var(--border);font-size:14px}
.cmt .who{font-weight:700;cursor:pointer}
.cmt .who:hover{color:var(--accent)}

/* profile */
.pcard{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden}
.pbanner{height:148px;position:relative}
.pbanner::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 82% 18%,rgba(255,255,255,.18),transparent 55%)}
.pbody{padding:0 24px 22px;margin-top:-44px;position:relative}
.ring{width:96px;height:96px;border-radius:50%;padding:3px;display:inline-block;
  background:conic-gradient(var(--accent),var(--gold),var(--accent2),var(--accent));box-shadow:var(--glow)}
.pstats{display:flex;gap:8px;margin:16px 0 4px;flex-wrap:wrap}
.pstat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:9px 16px;text-align:center;min-width:84px}
.pstat b{font-size:16px;display:block}
.pstat span{font-size:11px;color:var(--muted);letter-spacing:.4px}
.voice{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:13px;padding:10px 14px;margin-top:14px;max-width:360px}
.playb{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:var(--acc-ink);flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:var(--glow)}
.wave{display:flex;gap:2.5px;align-items:center;height:26px;flex:1}
.wave i{width:3px;background:var(--accent);border-radius:3px;opacity:.6}
.rankchip{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:6px 13px;font-size:12.5px}
.rankchip b{color:var(--accent)}
[data-theme="obsidian"] .rankchip b{color:var(--text)}

/* leaderboard */
.lb{display:flex;gap:26px;align-items:center;flex-wrap:wrap;justify-content:center}
.lbleg{display:flex;flex-direction:column;gap:8px;min-width:220px;flex:1}
.lbrow{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:8px 13px;border-radius:11px;
  background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .14s}
.lbrow:hover{border-color:var(--accent)}
.lbdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.lbrow .pc{margin-left:auto;color:var(--muted);font-size:12px;font-weight:700}
svg.donut .seg{transition:stroke-width .15s;cursor:pointer}
svg.donut .seg:hover{stroke-width:33}

/* grids */
.grid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}

/* notifications */
.nrow{display:flex;gap:13px;align-items:flex-start;padding:15px 17px;border-radius:15px;border:1px solid var(--border);
  background:var(--card);margin-bottom:9px;font-size:14px;transition:border-color .14s}
.nrow:hover{border-color:var(--border2)}
.nrow.unread{border-left:3px solid var(--accent);background:var(--card2)}
.nrow .ni{width:36px;height:36px;border-radius:11px;background:var(--soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent)}
[data-theme="obsidian"] .nrow .ni{color:var(--text)}
.nrow .tm{font-size:11.5px;color:var(--muted);margin-top:3px}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(5px);z-index:200;
  display:flex;align-items:flex-start;justify-content:center;padding:8vh 16px 16px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:560px;
  padding:26px;box-shadow:var(--shadow);animation:mpop .2s ease}
@keyframes mpop{from{transform:translateY(10px) scale(.97);opacity:0}}
.modal h2{font-size:18px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:7px;font-weight:700;letter-spacing:.8px}

/* themes grid */
.thgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:13px}
.thopt{border:2px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:all .15s;text-align:left}
.thopt:hover{border-color:var(--border2)}
.thopt.on{border-color:var(--accent);box-shadow:var(--glow)}
.thsw{height:58px;border-radius:11px;margin-bottom:11px;position:relative;overflow:hidden;border:1px solid rgba(128,128,128,.25)}
.thname{font-size:13.5px;font-weight:700}
.thpsy{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5}
</style>
</head>
<body data-theme="maroon">

<header id="mtop">
  <div class="logo" onclick="nav('#/explore')">L<b>O</b>RE</div>

/* ============ LIVE API ============ */
async function api(path,body){
  try{
    const r=await fetch(CONFIG.WORKER_URL+path,{method:"POST",
      headers:{"Content-Type":"application/json",...(S.token?{"Authorization":"Bearer "+S.token}:{})},
      body:JSON.stringify(body)});
    const d=await r.json();
    if(d.error){toast("⚠ "+d.error);if(/logged in|session/i.test(d.error))openAuth();}
    return d;
  }catch(e){return{error:String(e)};}
}

/* ============ AUTH ============ */
function openAuth(mode){
  mode=mode||"login";
  $("#modalroot").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="logo" style="font-size:24px;padding:0 0 16px">L<b>O</b>RE</div>
      <div class="tabs">
        <button class="tab ${mode==="login"?"on":""}" onclick="openAuth('login')">Log in</button>
        <button class="tab ${mode==="signup"?"on":""}" onclick="openAuth('signup')">Create account</button>
      </div>
      <div class="field"><label>USERNAME</label><input id="a_user" placeholder="a–z, 0–9, _ only" autocomplete="username"></div>
      ${mode==="signup"?`<div class="field"><label>EMAIL</label><input id="a_email" type="email" placeholder="you@gmail.com" autocomplete="email"></div>`:""}
      <div class="field"><label>PASSWORD ${mode==="signup"?"(8+ CHARACTERS)":""}</label><input id="a_pass" type="password" autocomplete="${mode==="signup"?"new-password":"current-password"}" onkeydown="if(event.key==='Enter')submitAuth('${mode}')"></div>
      <button class="btn" style="width:100%" onclick="submitAuth('${mode}')">${mode==="signup"?"Join the Lore":"Log in"}</button>
      <div class="muted" style="margin-top:14px;text-align:center">Forgot password? ${CONFIG.SUPPORT}</div>
    </div></div>`;
  setTimeout(()=>$("#a_user")&&$("#a_user").focus(),60);
}
async function submitAuth(mode){
  const body={username:$("#a_user").value.trim(),password:$("#a_pass").value};
  if(mode==="signup")body.email=$("#a_email").value.trim();
  const d=await api("/"+mode,body);
  if(d&&d.token){S.token=d.token;S.me=d.username;save();closeModal();
    toast(mode==="signup"?"Welcome to the Lore, @"+d.username:"Logged in as @"+d.username);render();}
}
function logout(){S.token="";save();toast("Logged out");render();if(LIVE)openAuth();}
function requireLogin(){if(LIVE&&!S.token){openAuth();return true;}return false;}

  const eb=p.echo==="RESONANCE"?`<span class="badge reso">RESONANCE</span>`:p.echo==="ECHO"?`<span class="badge echo">ECHO</span>`:"";
  return`<article class="card hov post" ${full?"":`onclick="if(!event.target.closest('button,.un,.chip,a,img'))nav('#/post/${p.id}')" style="cursor:pointer"`}>
    <div class="phead">

        <div class="un" onclick="event.stopPropagation();nav('#/u/${esc(p.author)}')">@${esc(p.author)}${SEED.users[p.author]?.seal?`<span class="badge seal" title="ANDROBEET Seal">${ic("seal")}</span>`:""}</div>
        <div class="tm">${timeAgo(p.ts)} ago</div>

    <div class="pacts">
      <button class="pact ${my==="up"?"up":""}" onclick="event.stopPropagation();vote('${p.id}','up')">${ic("up")} ${p.up.length}</button>
      <button class="pact ${my==="down"?"dn":""}" onclick="event.stopPropagation();vote('${p.id}','down')">${ic("down")} ${p.down.length}</button>
      <button class="pact" onclick="event.stopPropagation();nav('#/post/${p.id}')">${ic("cmt")} ${p.comments.length}</button>
      <button class="pact" onclick="event.stopPropagation();sharePost('${p.id}')">${ic("share")} ${p.shares}</button>
      <span class="score">${score>=0?"+":""}${score}</span>
    </div>
  </article>`;
}
function vote(id,dir){
  if(requireLogin())return;
  const mine=S.myPosts.find(p=>p.id===id);
  if(mine){
    const arr=dir==="up"?mine.up:mine.down,other=dir==="up"?mine.down:mine.up;
    const i=arr.indexOf(S.me);
    if(i>=0)arr.splice(i,1);else{arr.push(S.me);const j=other.indexOf(S.me);if(j>=0)other.splice(j,1);}
  }else S.votes[id]=S.votes[id]===dir?"":dir;
  save();render();
  if(LIVE)api("/vote",{post:id,dir});
}
function sharePost(id){
  S.shares[id]=(S.shares[id]||0)+1;save();
  const url=location.origin+location.pathname+"#/post/"+id;
  if(navigator.clipboard)navigator.clipboard.writeText(url).then(()=>toast("Link copied — shared")).catch(()=>toast(url));
  else toast(url);
  render();
}

let actx=null;
function playVoice(){
  try{
    actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const now=actx.currentTime;
    [220,277,330,440].forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.frequency.value=f;o.type="sine";
      g.gain.setValueAtTime(0.0001,now+i*0.16);g.gain.exponentialRampToValueAtTime(0.12,now+i*0.16+0.03);g.gain.exponentialRampToValueAtTime(0.0001,now+i*0.16+0.5);
      o.connect(g).connect(actx.destination);o.start(now+i*0.16);o.stop(now+i*0.16+0.55);
    });
    toast("Playing voice card");
  }catch(e){toast("Voice cards play audio from any URL");}
}

/* ---- PFP upload: crop square → resize 256px → JPEG ≤110KB → Worker ---- */
function pickPfp(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  if(!/^image\//.test(file.type)){toast("That's not an image");return;}
  const img=new Image();
  img.onload=async()=>{
    URL.revokeObjectURL(img.src);
    // center-crop to square
    const side=Math.min(img.width,img.height);
    const sx=(img.width-side)/2, sy=(img.height-side)/2;
    const cv=document.createElement("canvas");cv.width=cv.height=256;
    cv.getContext("2d").drawImage(img,sx,sy,side,side,0,0,256,256);
    // compress down until under ~110KB binary (150K base64)
    let q=0.9,dataUrl=cv.toDataURL("image/jpeg",q);
    while(dataUrl.length>150_000&&q>0.3){q-=0.1;dataUrl=cv.toDataURL("image/jpeg",q);}
    if(dataUrl.length>150_000){toast("Image too complex — try a simpler photo");return;}
    if(LIVE&&S.token){
      toast("Uploading…");
      const d=await api("/upload-pfp",{image:dataUrl});
      if(d&&d.ok){S.profile.pfp=d.url;save();render();toast("Profile picture updated");}
    }else{
      // not logged in / backend offline: store locally
      S.profile.pfp=dataUrl;save();render();toast("Profile picture set");
    }
  };
  img.onerror=()=>toast("Couldn't read that image");
  img.src=URL.createObjectURL(file);
  input.value="";
}

function setTheme(t){S.theme=t;save();document.body.dataset.theme=t;

function toggleTag(t){const i=S.profile.tags.indexOf(t);if(i>=0)S.profile.tags.splice(i,1);else S.profile.tags.push(t);save();render();}
function saveProfile(){

/* ============ LIVE DATA LOADER ============ */
let LIVEFEED=null, LIVEUSERS=null;
async function loadLive(){
  if(!LIVE)return;
  try{
    // bust jsDelivr cache hourly; fall back to raw for freshness
    const raw="https://raw.githubusercontent.com/"+CONFIG.DATA_BASE.split("/gh/")[1].replace("@main","")+"/main";
    const[f,u,t]=await Promise.all([
      fetch(raw+"/config/feed.json").then(r=>r.json()).catch(()=>null),
      fetch(raw+"/config/userindex.json").then(r=>r.json()).catch(()=>null),
      fetch(raw+"/config/tags.json").then(r=>r.json()).catch(()=>null)
    ]);
    if(Array.isArray(t)&&t.length)SEED.tags=t;
    if(Array.isArray(u))LIVEUSERS=u;
    if(Array.isArray(f)){
      LIVEFEED=f;
      // map live feed entries into post objects
      SEED.posts=f.map(e=>({id:e.id,author:e.author,topic:e.topic,ts:e.ts,text:e.snippet,img:e.img||"",
        up:Array(e.up||0).fill("·"),down:Array(e.down||0).fill("·"),shares:e.shares||0,
        echo:e.echo||"",pioneer:"",comments:Array(e.comments||0).fill({a:"",t:"",ts:0}),live:true}));
      render();
    }
  }catch(e){}
}
async function loadLivePost(id){
  if(!LIVE)return null;
  try{
    const raw="https://raw.githubusercontent.com/"+CONFIG.DATA_BASE.split("/gh/")[1].replace("@main","")+"/main";
    return await fetch(raw+"/posts/"+id+".json").then(r=>r.json());
  }catch(e){return null;}
}
async function loadLiveUser(name){
  if(!LIVE)return null;
  try{
    const raw="https://raw.githubusercontent.com/"+CONFIG.DATA_BASE.split("/gh/")[1].replace("@main","")+"/main";
    const u=await fetch(raw+"/users/"+name+".json").then(r=>r.json());
    if(u)SEED.users[name]={...u,color:userColor(name)};
    return u;
  }catch(e){return null;}
}
